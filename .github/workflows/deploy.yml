name: Deploy Nourish to GitHub Pages

on:
  push:
    branches: [main]          # deploy on every push to main
  workflow_dispatch:           # allow manual trigger from Actions tab

permissions:
  contents: write              # needed to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          INSTACART_KEY: ${{ secrets.INSTACART_KEY }}
          GH_TOKEN_VAL:  ${{ secrets.NOURISH_GH_TOKEN }}
          GH_USER:       ${{ secrets.GH_USER }}
          GH_REPO:       ${{ secrets.GH_REPO }}
        run: |
          sed -i "s|__ANTHROPIC_KEY__|${ANTHROPIC_KEY}|g" index.html
          sed -i "s|__INSTACART_KEY__|${INSTACART_KEY}|g" index.html
          sed -i "s|__GH_TOKEN__|${GH_TOKEN_VAL}|g"       index.html
          sed -i "s|__GH_USER__|${GH_USER}|g"             index.html
          sed -i "s|__GH_REPO__|${GH_REPO}|g"             index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,.gitignore,config.js,config.local.js'
